<div class="p-6 bg-gradient-to-br from-gray-800 via-gray-900 to-black text-white rounded-lg shadow-xl">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold flex items-center gap-2">
      <span class="text-cyan-400">🛡️</span> Gestionar Roles
    </h2>
    <button
      (click)="createRole()"
      class="py-2 px-5 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-semibold rounded-lg shadow-lg hover:from-blue-700 hover:to-cyan-600 transition-all duration-300">
      + Nuevo Rol
    </button>
  </div>

  <div class="mb-6">
    <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()"
      placeholder="🔍 Buscar por nombre o descripción..."
      class="w-full px-4 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 focus:ring-2 focus:ring-cyan-500 focus:outline-none"/>
  </div>

  <div class="overflow-x-auto rounded-lg border border-gray-700">
    <table class="min-w-full table-auto text-sm text-center bg-gray-800">
      <thead>
        <tr class="bg-gradient-to-r from-blue-900 to-blue-700 text-white">
          <th class="px-4 py-3 text-left">ID</th>
          <th class="px-4 py-3 text-left">Rol</th>
          <th class="px-4 py-3 text-left">Descripción</th>
          <th class="px-4 py-3 text-left">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let rol of filteredRoles" class="border-t border-gray-700 hover:bg-gray-700 transition-colors">
          <td class="px-4 py-3 text-left">{{ rol.iD_Rol }}</td>
          <td class="px-4 py-3 text-left">
            <span class="px-3 py-1 bg-cyan-600 text-white rounded-full text-xs font-semibold">
              {{ rol.nombre_Rol }}
            </span>
          </td>
          <td class="px-4 py-3 text-left text-gray-300">{{ rol.descripcion }}</td>
          <td class="px-4 py-3 text-left">
            <div class="flex gap-2">
              <a [routerLink]="['/dashboard/roles/edit', rol.iD_Rol]"
                class="bg-yellow-500 text-white px-3 py-2 rounded-lg hover:bg-yellow-600 transition-all duration-300">
                ✏️
              </a>
              <button *ngIf="rol.iD_Rol !== undefined" (click)="deleteRol(rol.iD_Rol)"
                class="bg-red-600 text-white px-3 py-2 rounded-lg hover:bg-red-700 transition-all duration-300">
                🗑️
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="filteredRoles.length === 0">
          <td colspan="4" class="px-4 py-6 text-gray-400">No se encontraron roles.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
