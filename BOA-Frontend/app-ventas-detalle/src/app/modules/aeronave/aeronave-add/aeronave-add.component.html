<div class="container mt-8 max-w-4xl mx-auto px-6">
  <h2 class="text-4xl font-extrabold mb-8 text-center text-transparent bg-gradient-to-r from-gray-700 to-blue-800 bg-clip-text">
    Nueva Aeronave
  </h2>
  <div class="space-y-8">
    <div class="grid grid-cols-3 gap-6">
      <div>
        <label class="block text-lg font-semibold text-white">Matrícula</label>
        <input type="text" [(ngModel)]="matricula" placeholder="Ej: CP-2901"
          class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300"/>
      </div>
      <div>
        <label class="block text-lg font-semibold text-white">Modelo</label>
        <input type="text" [(ngModel)]="modelo" placeholder="Ej: Boeing 737-300"
          class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300"/>
      </div>
      <div>
        <label class="block text-lg font-semibold text-white">Fabricante</label>
        <input type="text" [(ngModel)]="fabricante" placeholder="Ej: Boeing"
          class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300"/>
      </div>
    </div>

    <div>
      <label class="block text-lg font-semibold text-white mb-3">📋 Configuración de Asientos por Clase</label>

      <div class="overflow-x-auto rounded-lg border border-gray-700">
        <table class="min-w-full table-auto text-sm text-center bg-gray-800">
          <thead>
            <tr class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white">
              <th class="px-4 py-3 text-left">TIPO DE CLASE</th>
              <th class="px-4 py-3">CANTIDAD</th>
              <th class="px-4 py-3">COLUMNAS POR FILA</th>
              <th class="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let fila of filas" class="border-t border-gray-700 hover:bg-gray-700 transition-colors">
              <td class="px-4 py-3 text-left">
                <select [(ngModel)]="fila.tipo_Clase_Id"
                  class="w-full px-3 py-2 bg-gray-900 text-white rounded-lg border border-gray-700 focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                  <option [value]="0">Seleccionar...</option>
                  <option *ngFor="let tc of tiposClase" [value]="tc.id">{{ tc.nombre }}</option>
                </select>
              </td>
              <td class="px-4 py-3">
                <input type="number" [(ngModel)]="fila.cantidad" min="0"
                  class="w-full px-3 py-2 bg-gray-900 text-white rounded-lg border border-gray-700 text-center focus:ring-2 focus:ring-cyan-500 focus:outline-none"
                  onwheel="this.blur()"/>
              </td>
              <td class="px-4 py-3">
                <input type="number" [(ngModel)]="fila.columnas_Por_Fila" min="1" max="10"
                  class="w-full px-3 py-2 bg-gray-900 text-white rounded-lg border border-gray-700 text-center focus:ring-2 focus:ring-cyan-500 focus:outline-none"
                  onwheel="this.blur()"/>
              </td>
              <td class="px-4 py-3">
                <button (click)="quitarFila(fila.id)"
                  class="bg-red-600 text-white px-3 py-2 rounded-lg hover:bg-red-700 transition-all duration-300">
                  🗑️
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="flex justify-between items-center mt-4">
        <button (click)="agregarFila()"
          class="py-2 px-5 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-semibold rounded-lg shadow-lg hover:from-blue-700 hover:to-cyan-600 transition-all duration-300">
          + Agregar clase
        </button>
        <p class="text-gray-300 text-sm">Total asientos: <span class="font-bold text-white">{{ totalAsientos }}</span></p>
      </div>
    </div>

    <div class="text-center">
      <button (click)="save()" [disabled]="guardando"
        class="py-3 px-6 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-semibold rounded-lg shadow-xl hover:from-blue-700 hover:to-cyan-600 transform hover:scale-110 transition-all duration-300">
        {{ guardando ? '⏳ Guardando...' : '✓ Guardar Aeronave y Generar Asientos' }}
      </button>
    </div>
    <div class="mt-4 text-center">
      <a routerLink="../list"
        class="py-3 px-6 bg-gradient-to-r from-gray-700 to-gray-600 text-white font-semibold rounded-lg shadow-xl hover:from-gray-800 hover:to-gray-700 transform hover:scale-110 transition-all duration-300">
        Volver
      </a>
    </div>
  </div>
</div>
