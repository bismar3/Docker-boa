<div class="flex items-center justify-center min-h-full pt-20 pb-10 bg-gray-950 rounded-lg">
  <div class="w-full max-w-md p-6 rounded-2xl bg-gradient-to-br from-gray-800 via-gray-900 to-black text-white shadow-xl">
    <h2 class="text-3xl font-bold mb-6 text-center text-gradient">
      Crear Usuario
    </h2>

    <form [formGroup]="userForm" (ngSubmit)="createUser()" class="space-y-5">

      <!-- Username -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-300">Username</label>
        <input
          type="text"
          id="username"
          class="w-full px-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg shadow-md focus:ring-2 focus:ring-cyan-500 focus:outline-none text-gray-200 placeholder-gray-400 transition-all duration-300"
          formControlName="username"
          placeholder="Username del usuario"
        />
        <div *ngIf="userForm.get('username')?.invalid && userForm.get('username')?.touched" class="text-red-400 text-sm mt-1">
          El username es requerido (máximo 30 caracteres).
        </div>
      </div>

      <!-- Nombre Completo -->
      <div>
        <label for="fullname" class="block text-sm font-medium text-gray-300">Nombre Completo</label>
        <input
          type="text"
          id="fullname"
          class="w-full px-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg shadow-md focus:ring-2 focus:ring-cyan-500 focus:outline-none text-gray-200 placeholder-gray-400 transition-all duration-300"
          formControlName="fullname"
          placeholder="Nombre y apellidos"
        />
        <div *ngIf="userForm.get('fullname')?.invalid && userForm.get('fullname')?.touched" class="text-red-400 text-sm mt-1">
          El nombre completo es requerido (máximo 30 caracteres).
        </div>
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-300">Contraseña</label>
        <input
          type="password"
          id="password"
          class="w-full px-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg shadow-md focus:ring-2 focus:ring-cyan-500 focus:outline-none text-gray-200 placeholder-gray-400 transition-all duration-300"
          formControlName="password"
          placeholder="Contraseña"
        />
        <div *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched" class="text-red-400 text-sm mt-1">
          La contraseña es requerida (máximo 30 caracteres).
        </div>
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300">Email</label>
        <input
          type="email"
          id="email"
          class="w-full px-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg shadow-md focus:ring-2 focus:ring-cyan-500 focus:outline-none text-gray-200 placeholder-gray-400 transition-all duration-300"
          formControlName="email"
          placeholder="correo@ejemplo.com"
        />
        <div *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched" class="text-red-400 text-sm mt-1">
          Ingresá un email válido.
        </div>
      </div>

      <!-- Documento de Identidad -->
      <div>
        <label for="documento_Identidad" class="block text-sm font-medium text-gray-300">Documento de Identidad</label>
        <input
          type="text"
          id="documento_Identidad"
          class="w-full px-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg shadow-md focus:ring-2 focus:ring-cyan-500 focus:outline-none text-gray-200 placeholder-gray-400 transition-all duration-300"
          formControlName="documento_Identidad"
          placeholder="Ej: 12345678"
        />
      </div>

      <!-- Teléfono -->
      <div>
        <label for="telefono" class="block text-sm font-medium text-gray-300">Teléfono</label>
        <input
          type="text"
          id="telefono"
          class="w-full px-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg shadow-md focus:ring-2 focus:ring-cyan-500 focus:outline-none text-gray-200 placeholder-gray-400 transition-all duration-300"
          formControlName="telefono"
          placeholder="Ej: 70000000"
        />
      </div>

      <!-- Fecha de Nacimiento -->
      <div>
        <label for="fecha_Nacimiento" class="block text-sm font-medium text-gray-300">Fecha de Nacimiento</label>
        <input
          type="date"
          id="fecha_Nacimiento"
          class="w-full px-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg shadow-md focus:ring-2 focus:ring-cyan-500 focus:outline-none text-gray-200 transition-all duration-300"
          formControlName="fecha_Nacimiento"
        />
      </div>

      <!-- Estado -->
      <div>
        <label for="estado" class="block text-sm font-medium text-gray-300">Estado</label>
        <select
          id="estado"
          class="w-full px-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg shadow-md focus:ring-2 focus:ring-cyan-500 focus:outline-none text-gray-200 transition-all duration-300"
          formControlName="estado"
        >
          <option value="Activo">Activo</option>
          <option value="Inactivo">Inactivo</option>
          <option value="Bloqueado">Bloqueado</option>
        </select>
      </div>

      <!-- Botón Crear -->
      <button
        type="submit"
        class="w-full py-3 px-6 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-semibold rounded-lg shadow-lg transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-opacity-50 transition-all duration-300"
        [disabled]="userForm.invalid"
      >
        Agregar Usuario
      </button>

      <!-- Botón Volver -->
      <button
        class="w-full py-2 px-4 bg-gradient-to-r from-gray-700 to-gray-900 text-white font-bold rounded-lg shadow-lg hover:from-gray-600 hover:to-gray-800 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-opacity-50 transition-all duration-300"
        type="button"
        (click)="goBack()"
      >
        ⬅ Volver
      </button>
    </form>
  </div>
</div>
