<div class="p-6 bg-gradient-to-br from-gray-800 via-gray-900 to-black text-white rounded-lg shadow-xl">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold flex items-center gap-2">
      <span class="text-cyan-400">👥</span> Gestionar Usuarios
    </h2>
    <button
      (click)="createUser()"
      class="py-2 px-5 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-semibold rounded-lg shadow-lg hover:from-blue-700 hover:to-cyan-600 transition-all duration-300">
      + Nuevo Usuario
    </button>
  </div>

  <div class="mb-6">
    <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()"
      placeholder="🔍 Buscar por nombre, username o email..."
      class="w-full px-4 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 focus:ring-2 focus:ring-cyan-500 focus:outline-none"/>
  </div>

  <div class="overflow-x-auto rounded-lg border border-gray-700">
    <table class="min-w-full table-auto text-sm text-center bg-gray-800">
      <thead>
        <tr class="bg-gradient-to-r from-blue-900 to-blue-700 text-white">
          <th class="px-4 py-3 text-left">ID</th>
          <th class="px-4 py-3 text-left">Username</th>
          <th class="px-4 py-3 text-left">Nombre Completo</th>
          <th class="px-4 py-3 text-left">Email</th>
          <th class="px-4 py-3 text-left">Roles</th>
          <th class="px-4 py-3 text-left">Estado</th>
          <th class="px-4 py-3 text-left">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of filteredUsers" class="border-t border-gray-700 hover:bg-gray-700 transition-colors">
          <td class="px-4 py-3 text-left">{{ user.userId }}</td>
          <td class="px-4 py-3 text-left font-semibold">{{ user.username }}</td>
          <td class="px-4 py-3 text-left">{{ user.fullname }}</td>
          <td class="px-4 py-3 text-left text-gray-300">{{ user.email || '—' }}</td>
          <td class="px-4 py-3 text-left">
            <div class="flex flex-wrap gap-1">
              <ng-container *ngIf="user.roles && user.roles.length > 0; else noRoles">
                <span *ngFor="let rol of user.roles" class="px-2 py-1 bg-cyan-600 text-white rounded-full text-xs font-semibold">
                  {{ rol.nombre_Rol }}
                </span>
              </ng-container>
              <ng-template #noRoles>
                <span class="text-gray-400 text-xs">Sin roles</span>
              </ng-template>
            </div>
          </td>
          <td class="px-4 py-3 text-left">
            <span class="px-2 py-1 rounded-full text-xs font-semibold"
              [class.bg-green-600]="user.estado === 'Activo'"
              [class.bg-red-600]="user.estado !== 'Activo'">
              {{ user.estado || 'Activo' }}
            </span>
          </td>
          <td class="px-4 py-3 text-left">
            <div class="flex gap-2">
              <a [routerLink]="['/dashboard/user/edit', user.userId]"
                class="bg-yellow-500 text-white px-3 py-2 rounded-lg hover:bg-yellow-600 transition-all duration-300">
                ✏️
              </a>
              <button *ngIf="user.userId !== undefined" (click)="deleteUser(user.userId)"
                class="bg-red-600 text-white px-3 py-2 rounded-lg hover:bg-red-700 transition-all duration-300">
                🗑️
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="filteredUsers.length === 0">
          <td colspan="7" class="px-4 py-6 text-gray-400">No se encontraron usuarios.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
