<div class="p-6 bg-gradient-to-br from-gray-800 via-gray-900 to-black text-white rounded-lg shadow-xl min-h-screen">

  <h2 class="text-3xl font-bold mb-8 flex items-center gap-2">
    👥 Gestionar Clientes
  </h2>

  <div class="flex flex-wrap gap-3 items-center mb-6 bg-gray-800 p-4 rounded-2xl">
    <div class="flex items-center gap-2 bg-gray-700 rounded-xl px-3 py-2 flex-1 min-w-48">
      <span>🔍</span>
      <input
        type="text"
        [(ngModel)]="filtroTexto"
        placeholder="Buscar por nombre o documento..."
        class="bg-transparent outline-none text-white w-full text-sm"/>
    </div>
    <button (click)="filtrar()"
      class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-all">
      Filtrar
    </button>
    <button (click)="limpiar()"
      class="border border-gray-500 text-gray-300 hover:bg-gray-700 px-4 py-2 rounded-xl text-sm font-semibold transition-all">
      Limpiar
    </button>
  </div>

  <div *ngIf="cargando" class="text-center text-gray-400 py-10">Cargando...</div>

  <div *ngIf="!cargando" class="overflow-x-auto">
    <table class="min-w-full table-auto text-sm text-center bg-gray-800 rounded-lg shadow-lg border-separate border-spacing-1 border border-gray-700">
      <thead>
        <tr class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white">
          <th class="px-2 py-2 text-left rounded-l-lg">#</th>
          <th class="px-2 py-2 text-left">NOMBRE</th>
          <th class="px-2 py-2 text-left">DOCUMENTO</th>
          <th class="px-2 py-2 text-left">EMAIL</th>
          <th class="px-2 py-2 text-left">TELÉFONO</th>
          <th class="px-2 py-2 text-left">ESTADO</th>
          <th class="px-2 py-2 text-left rounded-r-lg">ACCIONES</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of clientesFiltrados"
          class="hover:bg-gray-700 transition-colors duration-300 border-b border-gray-700">
          <td class="px-2 py-2">{{ c.id }}</td>
          <td class="px-2 py-2 font-semibold">{{ c.nombre }} {{ c.apellido }}</td>
          <td class="px-2 py-2">{{ c.documento_Identidad }}</td>
          <td class="px-2 py-2">{{ c.email }}</td>
          <td class="px-2 py-2">{{ c.telefono || '-' }}</td>
          <td class="px-2 py-2">
            <span class="px-2 py-1 rounded-full text-xs font-semibold"
              [ngClass]="getEstadoClass(c.estado)">
              {{ c.estado }}
            </span>
          </td>
          <td class="px-2 py-2">
            <div class="flex gap-1 justify-center">
              <button (click)="verDetalle(c)" title="Observar"
                class="bg-cyan-600 text-white px-2 py-1 rounded-lg hover:bg-cyan-700 transition-all duration-300">
                👁️
              </button>
              <button (click)="toggleBloqueo(c)" title="Bloquear/Activar"
                class="bg-yellow-500 text-white px-2 py-1 rounded-lg hover:bg-yellow-600 transition-all duration-300">
                🔒
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="clientesFiltrados.length === 0">
          <td colspan="7" class="px-2 py-6 text-gray-400">No hay clientes registrados</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
