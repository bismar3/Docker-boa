<div class="p-6 mt-10 bg-gradient-to-br from-gray-900 via-black to-blue-900 text-white rounded-2xl shadow-2xl border border-blue-500/30">
  <h2 class="text-4xl font-extrabold mb-8 text-center bg-gradient-to-r from-blue-400 via-blue-600 to-cyan-500 bg-clip-text text-transparent">
    Lista de Almacenes con Productos
  </h2>

  <!-- Botón para crear un nuevo almacén -->
  <div class="flex justify-end mb-4">
    <button (click)="crearAlmacen()"
      class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-md transition-transform transform hover:scale-105">
      ➕ Crear Almacén
    </button>
  </div>

  <div *ngIf="mensaje" class="mt-3 mb-2 p-4 bg-blue-100 border-l-4 border-blue-500 text-blue-700 rounded-lg flex items-center justify-between">
    <span>{{ mensaje }}</span>
    <button (click)="mensaje = ''" class="text-blue-700 hover:text-blue-900 font-bold">
      &times;
    </button>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full table-auto text-sm text-center bg-gray-900/80 backdrop-blur-lg rounded-xl shadow-xl border-separate border-spacing-1 border border-gray-700">
      <thead>
        <tr class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white">
          <th class="px-5 py-2 text-left rounded-l-xl">ID</th>
          <th class="px-5 py-2 text-left">Almacén</th>
          <th class="px-5 py-2 text-left">Dirección</th>
          <th class="px-5 py-2 text-left rounded-r-xl">Productos</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let almacen of almacenes"
          class="hover:bg-gray-800 transition-colors duration-300 ease-in-out border-b border-gray-700">
          <td class="px-6 py-4">{{ almacen.id }}</td>
          <td class="px-6 py-4 font-semibold text-blue-400">{{ almacen.nombre }}</td>
          <td class="px-6 py-4">{{ almacen.locacion }}</td>
          <td class="px-6 py-4">
            <div class="flex flex-wrap gap-2 justify-start">
              <ng-container *ngIf="almacen.productos && almacen.productos.length > 0; else noProductosAlmacen">
                <div *ngFor="let producto of almacen.productos" class="flex items-center gap-2 bg-blue-500/20 text-blue-300 rounded-lg shadow-md px-3 py-1 text-sm hover:bg-blue-500/30 transition duration-300">
                  <span>
                    {{ producto.nombreProducto }} - Stock {{ producto.stock }} - {{ producto.precio }} Bs
                  </span>
                  <button
                    (click)="eliminarProducto(producto.productoId!,almacen.id!)"

                    class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded-md transition duration-300">
                    X
                  </button>
                </div>
              </ng-container>
              <ng-template #noProductosAlmacen>
                <span class="text-gray-400 italic">🚫 No tiene productos este almacén.</span>
              </ng-template>
            </div>

          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
