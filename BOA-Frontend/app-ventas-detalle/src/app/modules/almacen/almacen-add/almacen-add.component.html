<div class="max-w-lg mx-auto mt-10 p-8 bg-gradient-to-br from-gray-900 via-gray-800 to-blue-900 rounded-2xl shadow-2xl border border-blue-500/30">
  <h2 class="text-3xl font-extrabold text-center mb-6 bg-gradient-to-r from-blue-400 via-blue-600 to-cyan-500 bg-clip-text text-transparent">
    🚀 Crear Almacén
  </h2>

  <form [formGroup]="almacenForm" (ngSubmit)="createAlmacen()" class="space-y-6">
    <!-- Nombre del almacén -->
    <div>
      <label for="nombre" class="block text-sm font-semibold text-gray-300">📌 Nombre del almacén</label>
      <input
        type="text"
        id="nombre"
        formControlName="nombre"
        placeholder="Ejemplo: Central de Suministros"
        class="w-full px-4 py-3 mt-2 bg-gray-800 text-white rounded-lg border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
      />
      <div *ngIf="almacenForm.get('nombre')?.invalid && almacenForm.get('nombre')?.touched"
        class="mt-1 text-red-400 text-sm flex items-center">
        ⚠️ El nombre es requerido (máx. 30 caracteres).
      </div>
    </div>

    <!-- Localización del almacén -->
    <div>
      <label for="locacion" class="block text-sm font-semibold text-gray-300">📍 Ubicación</label>
      <input
        type="text"
        id="locacion"
        formControlName="locacion"
        placeholder="Ejemplo: Av. Principal #123"
        class="w-full px-4 py-3 mt-2 bg-gray-800 text-white rounded-lg border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
      />
      <div *ngIf="almacenForm.get('locacion')?.invalid && almacenForm.get('locacion')?.touched"
        class="mt-1 text-red-400 text-sm flex items-center">
        ⚠️ La ubicación es requerida (máx. 30 caracteres).
      </div>
    </div>

    <!-- Botón -->
    <button
      type="submit"
      class="w-full py-3 bg-gradient-to-r from-blue-600 via-blue-500 to-cyan-500 text-white font-bold rounded-lg hover:scale-105 hover:shadow-lg transition-all duration-300 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed"
      [disabled]="almacenForm.invalid">
      ➕ Agregar Almacén
    </button>
  </form>
</div>
