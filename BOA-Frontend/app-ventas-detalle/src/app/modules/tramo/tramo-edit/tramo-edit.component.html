<div class="container mt-8 max-w-4xl mx-auto px-6">
  <h2 class="text-4xl font-extrabold mb-8 text-center text-transparent bg-gradient-to-r from-gray-700 to-blue-800 bg-clip-text">
    Editar Tramo
  </h2>

  <div *ngIf="cargando" class="text-center text-gray-400">Cargando...</div>

  <div *ngIf="!cargando" class="space-y-8">
    <div class="mb-6">
      <label class="block text-lg font-semibold text-white">Tramo Padre (opcional — si es sub-tramo de escala)</label>
      <select [(ngModel)]="tramo.tramo_Padre_Id"
        class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300">
        <option [value]="undefined">— Tramo raíz (sin padre) —</option>
        <option *ngFor="let t of tramos" [value]="t.id">
          {{getNombreAeropuerto(t.aeropuerto_Origen_Id)}} → {{getNombreAeropuerto(t.aeropuerto_Destino_Id)}}
        </option>
      </select>
    </div>
    <div class="grid grid-cols-2 gap-6 mb-6">
      <div>
        <label class="block text-lg font-semibold text-white">Aeropuerto Origen</label>
        <select [(ngModel)]="tramo.aeropuerto_Origen_Id"
          class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300">
          <option value="0" disabled>Seleccionar origen...</option>
          <option *ngFor="let a of aeropuertos" [value]="a.id">{{a.nombre}} ({{a.codigo_IATA}})</option>
        </select>
      </div>
      <div>
        <label class="block text-lg font-semibold text-white">Aeropuerto Destino</label>
        <select [(ngModel)]="tramo.aeropuerto_Destino_Id"
          class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300">
          <option value="0" disabled>Seleccionar destino...</option>
          <option *ngFor="let a of aeropuertos" [value]="a.id">{{a.nombre}} ({{a.codigo_IATA}})</option>
        </select>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-6 mb-6">
      <div>
        <label class="block text-lg font-semibold text-white">Duración de vuelo</label>
        <input type="time" [(ngModel)]="tramo.duracion_Estimada"
          class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300"/>
      </div>
      <div>
        <label class="block text-lg font-semibold text-white">Tiempo de escala (opcional)</label>
        <input type="time" [(ngModel)]="tramo.tiempo_Escala"
          class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300"/>
      </div>
      <div>
        <label class="block text-lg font-semibold text-white">Orden</label>
        <input type="number" [(ngModel)]="tramo.orden" min="1"
          class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300"
          onwheel="this.blur()"/>
      </div>
    </div>
    <div class="text-center">
      <button (click)="save()"
        class="py-3 px-6 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-semibold rounded-lg shadow-xl hover:from-blue-700 hover:to-cyan-600 transform hover:scale-110 transition-all duration-300">
        Guardar Cambios
      </button>
    </div>
    <div class="mt-4 text-center">
      <a routerLink="/dashboard/tramo/list"
        class="py-3 px-6 bg-gradient-to-r from-gray-700 to-gray-600 text-white font-semibold rounded-lg shadow-xl hover:from-gray-800 hover:to-gray-700 transform hover:scale-110 transition-all duration-300">
        Volver
      </a>
    </div>
  </div>
</div>
