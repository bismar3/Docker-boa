<!-- Tabla Mejorada -->
<div class="p-6 mt-10 bg-gradient-to-br from-gray-900 via-black to-blue-900 text-white rounded-2xl shadow-2xl border border-blue-500/30">
  <h2 class="text-4xl font-extrabold mb-8 text-center bg-gradient-to-r from-blue-400 via-blue-600 to-cyan-500 bg-clip-text text-transparent">
    Lista de Productos
  </h2>

  <!-- Botón para crear un nuevo almacén -->
  <div class="flex justify-end mb-4">
    <button (click)="agregarProducto()"
      class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-md transition-transform transform hover:scale-105">
      ➕ Crear Producto
    </button>
  </div>

  <div *ngIf="message" class="mt-3 mb-2 p-4 bg-blue-100 border-l-4 border-blue-500 text-blue-700 rounded-lg flex items-center justify-between">
    <span>{{ message }}</span>
    <button (click)="message = ''" class="text-blue-700 hover:text-blue-900 font-bold">
      &times;
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full table-auto text-sm text-center bg-gray-900/80 backdrop-blur-lg rounded-xl shadow-xl border-separate border-spacing-1 border border-gray-700">
      <thead>
        <tr class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white">
          <th class="px-5 py-2 text-left rounded-l-xl">ID</th>
          <th class="px-5 py-2 text-left">Producto</th>
          <th class="px-5 py-2 text-left">Precio</th>
          <th class="px-5 py-2 text-left">Categoria</th>
          <th class="px-5 py-2 text-left rounded-r-xl">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let producto of products"
          class="hover:bg-gray-800 transition-colors duration-300 ease-in-out border-b border-gray-700">
          <td class="px-6 py-4">{{ producto.id }}</td>
          <td class="px-6 py-4 font-semibold text-blue-400">{{ producto.nombre }}</td>
          <td class="px-6 py-4">{{ producto.precio }}</td>
          <td class="px-6 py-4">{{ producto.categoria?.nombre }}</td>
          <td class="px-6 py-4">
            <button (click)="deleteProduct(producto.id!)"
              class="px-4 py-2 bg-red-600 hover:bg-red-500 text-white font-semibold rounded-lg shadow-md transition-transform transform hover:scale-105">
              🗑️ Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
