<div class="p-6 bg-gradient-to-br from-gray-800 via-gray-900 to-black text-white rounded-lg shadow-xl">
  <h2 class="text-3xl font-bold mb-8 text-center bg-gradient-to-r from-gray-600 to-blue-600 bg-clip-text text-transparent">
    Lista de Aeropuertos
  </h2>
  <div class="mb-6 text-right">
    <a routerLink="../add"
      class="py-3 px-6 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-semibold rounded-lg shadow-xl hover:from-blue-700 hover:to-cyan-600 transform hover:scale-110 transition-all duration-300">
      Nuevo Aeropuerto
    </a>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full table-auto text-sm text-center bg-gray-800 rounded-lg shadow-lg border-separate border-spacing-1 border border-gray-700">
      <thead>
        <tr class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white">
          <th class="px-1 py-1 text-left rounded-l-lg">ID</th>
          <th class="px-1 py-1 text-left">Código IATA</th>
          <th class="px-1 py-1 text-left">Nombre</th>
          <th class="px-1 py-1 text-left">Ciudad</th>
          <th class="px-1 py-1 text-left">País</th>
          <th class="px-1 py-1 text-left">Latitud</th>
          <th class="px-1 py-1 text-left">Longitud</th>
          <th class="px-1 py-1 text-left rounded-r-lg">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let a of aeropuertos" class="hover:bg-gray-700 transition-colors duration-300 border-b border-gray-700">
          <td class="px-1 py-1">{{a.id}}</td>
          <td class="px-1 py-1">{{a.codigo_IATA}}</td>
          <td class="px-1 py-1">{{a.nombre}}</td>
          <td class="px-1 py-1">{{a.ciudad}}</td>
          <td class="px-1 py-1">{{a.pais}}</td>
          <td class="px-1 py-1">{{a.latitud ?? '—'}}</td>
          <td class="px-1 py-1">{{a.longitud ?? '—'}}</td>
          <td class="px-2 py-2">
            <div class="flex gap-1 justify-center">
              <button [routerLink]="['../edit', a.id]"
                class="bg-yellow-500 text-white px-2 py-1 rounded-lg shadow-md hover:bg-yellow-600 transition-all duration-300">
                Editar
              </button>
              <button (click)="delete(a.id!)"
                class="bg-gradient-to-r from-red-600 to-red-700 text-white px-2 py-1 rounded-lg shadow-md hover:from-red-700 hover:to-red-800 transition-all duration-300">
                Eliminar
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
