<div class="container mt-8 max-w-4xl mx-auto px-6">
  <h2 class="text-4xl font-extrabold mb-8 text-center text-transparent bg-gradient-to-r from-gray-700 to-blue-800 bg-clip-text">
    Nueva Ruta
  </h2>
  <div class="space-y-8">
    <div class="mb-6">
      <label class="block text-lg font-semibold text-white">Aeropuerto Origen</label>
      <select [(ngModel)]="ruta.aeropuerto_Origen_Id"
        class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300">
        <option value="0" disabled>Seleccione aeropuerto origen</option>
        <option *ngFor="let a of aeropuertos" [value]="a.id">{{a.nombre}} ({{a.codigo_IATA}})</option>
      </select>
    </div>
    <div class="mb-6">
      <label class="block text-lg font-semibold text-white">Aeropuerto Destino</label>
      <select [(ngModel)]="ruta.aeropuerto_Destino_Id"
        class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300">
        <option value="0" disabled>Seleccione aeropuerto destino</option>
        <option *ngFor="let a of aeropuertos" [value]="a.id">{{a.nombre}} ({{a.codigo_IATA}})</option>
      </select>
    </div>
    <div class="mb-6">
      <label class="block text-lg font-semibold text-white">Distancia (km)</label>
      <input type="number" [(ngModel)]="ruta.distancia" min="0"
        class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300"
        style="-moz-appearance: textfield;"
        onwheel="this.blur()"/>
    </div>
    <div class="mb-6">
      <label class="block text-lg font-semibold text-white">Duración Estimada</label>
      <input type="time" [(ngModel)]="ruta.duracion_Estimada"
        class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300"/>
    </div>
    <div class="mb-6">
      <label class="block text-lg font-semibold text-white">Tipo</label>
      <select [(ngModel)]="ruta.tipo"
        class="w-full mt-2 px-5 py-3 bg-gray-800 text-white rounded-lg border border-gray-700 shadow-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition duration-300">
        <option value="Nacional">Nacional</option>
        <option value="Internacional">Internacional</option>
      </select>
    </div>
    <div class="text-center">
      <button (click)="save()"
        class="py-3 px-6 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-semibold rounded-lg shadow-xl hover:from-blue-700 hover:to-cyan-600 transform hover:scale-110 transition-all duration-300">
        Guardar
      </button>
    </div>
    <div class="mt-4 text-center">
      <a routerLink="../list"
        class="py-3 px-6 bg-gradient-to-r from-gray-700 to-gray-600 text-white font-semibold rounded-lg shadow-xl hover:from-gray-800 hover:to-gray-700 transform hover:scale-110 transition-all duration-300">
        Volver
      </a>
    </div>
  </div>
</div>
