<main id="theme-root" class="flex flex-col sm:flex-row text-white bg-gray-900 min-h-screen">
  <div *ngIf="themeService.mode === 'light'"
    class="pointer-events-none fixed inset-0 z-40 bg-sky-300 opacity-30 mix-blend-soft-light"></div>

  <!-- Sidebar -->
  <nav class="hidden sm:flex flex-col w-72 min-h-screen bg-gray-800 bg-opacity-50 p-5 rounded-3xl overflow-y-auto max-h-screen">
    <h1 class="font-bold text-lg lg:text-3xl bg-gradient-to-br from-white via-white/50 bg-clip-text text-transparent text-center">
      BoA<span class="text-indigo-500">.</span>
    </h1>
    <div class="border-gray-700 border my-5"></div>

    <div class="flex flex-col space-y-2">
      @for (route of routes; track $index) {
        <app-sidebar
        *ngIf="hasPermission(route.data!['permission'])"
          [description]="route.data!['description']"
          [icon]="route.data!['icon']"
          [title]="route.data!['title']"
          [path]="route.path!"
        />
      }
    </div>
  </nav>

  <!-- Content Section -->
  <section class="flex flex-col w-full max-h-screen bg-gray-800 bg-opacity-40 p-4 sm:mx-5 rounded-3xl">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-3 bg-gray-700 p-4 rounded-3xl mb-4 shadow-lg relative">

      <!-- Buscador global -->
      <div class="relative w-full sm:w-96">
        <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="onBuscarGlobalInput()"
          placeholder="🔍 Buscar vuelos, usuarios, aeropuertos, rutas..."
          class="w-full px-4 py-2 bg-gray-900 text-white rounded-xl border border-gray-600 focus:ring-2 focus:ring-cyan-500 focus:outline-none text-sm"/>

        <div *ngIf="resultadosBusqueda.length > 0 || buscandoGlobal"
          class="absolute z-30 w-full bg-gray-900 border border-gray-700 rounded-xl shadow-2xl mt-2 overflow-hidden max-h-80 overflow-y-auto">
          <p *ngIf="buscandoGlobal" class="px-4 py-3 text-cyan-400 text-sm">🔄 Buscando...</p>
          <div *ngFor="let r of resultadosBusqueda"
            (click)="irAResultado(r)"
            class="px-4 py-3 cursor-pointer hover:bg-gray-700 transition-colors border-b border-gray-800 last:border-0 flex items-center gap-3">
            <span class="text-xl">{{ r.icono }}</span>
            <div>
              <p class="text-xs text-cyan-400 font-semibold">{{ r.tipo }}</p>
              <p class="text-sm font-semibold text-white">{{ r.titulo }}</p>
              <p class="text-xs text-gray-400">{{ r.subtitulo }}</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Menú de usuario -->
      <div class="relative">
        <button (click)="toggleMenuUsuario()"
          class="flex items-center gap-2 bg-gray-800 hover:bg-gray-900 px-4 py-2 rounded-xl transition-colors">
          <span class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-sm font-bold">
            {{ (user?.fullname || user?.username || '?').charAt(0).toUpperCase() }}
          </span>
          <span class="font-semibold text-sm">{{ user?.fullname || user?.username }}</span>
          <span class="text-xs">▼</span>
        </button>

        <div *ngIf="mostrarMenuUsuario" (click)="cerrarMenuUsuario()" class="fixed inset-0 z-20"></div>

        <div *ngIf="mostrarMenuUsuario"
          class="absolute right-0 mt-2 w-72 bg-white text-gray-900 rounded-xl shadow-2xl z-30 overflow-hidden">
          <div class="p-4 border-b border-gray-200">
            <p class="font-bold">{{ user?.fullname || user?.username }}</p>
            <p class="text-xs text-blue-600 font-semibold">{{ user?.roles?.[0]?.nombre_Rol }}</p>
          </div>

          <div class="p-4 border-b border-gray-200">
            <p class="text-xs font-semibold text-gray-500 mb-2">🎨 Apariencia</p>
            <div class="flex items-center gap-3">
              <button (click)="setColor('blue')"
                class="w-7 h-7 rounded-full bg-blue-600 border-2 transition-all"
                [class.border-gray-900]="themeService.color === 'blue'"
                [class.border-transparent]="themeService.color !== 'blue'"></button>
              <button (click)="setColor('orange')"
                class="w-7 h-7 rounded-full bg-orange-500 border-2 transition-all"
                [class.border-gray-900]="themeService.color === 'orange'"
                [class.border-transparent]="themeService.color !== 'orange'"></button>
              <button (click)="setColor('green')"
                class="w-7 h-7 rounded-full bg-green-600 border-2 transition-all"
                [class.border-gray-900]="themeService.color === 'green'"
                [class.border-transparent]="themeService.color !== 'green'"></button>
              <span class="text-xs text-gray-500 ml-1">Color</span>
            </div>
          </div>

          <button (click)="toggleModo()"
            class="w-full text-left px-4 py-3 hover:bg-gray-100 transition-colors flex items-center gap-2 text-sm border-b border-gray-200">
            <span>{{ themeService.mode === 'dark' ? '☀️' : '🌙' }}</span>
            <span>Modo {{ themeService.mode === 'dark' ? 'Día' : 'Noche' }}</span>
          </button>

          <button (click)="logout()"
            class="w-full text-left px-4 py-3 hover:bg-red-50 transition-colors flex items-center gap-2 text-sm text-red-600">
            <span>🚪</span>
            <span>Cerrar Sesión</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex flex-auto flex-col overflow-y-auto">
      <router-outlet />
    </div>
  </section>
</main>
